name: Store Release (App Store / Google Play)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '배포 플랫폼'
        required: true
        type: choice
        default: all
        options:
          - all
          - ios
          - android

jobs:
  store-submit:
    name: EAS Submit to App Stores
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          packager: npm
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # Google Play 서비스 계정 키 파일 생성 (Android 배포 시)
      - name: Create Google Service Account Key
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > google-service-account.json

      # App Store Connect API 키 파일 생성 (iOS 배포 시)
      - name: Create App Store Connect API Key
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # eas.json의 submit 프로파일에 필요한 환경변수 설정 후 제출
      - name: Inject ascAppId into eas.json
        if: ${{ secrets.ASC_APP_ID != '' }}
        run: |
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('eas.json')); data.submit=data.submit||{}; data.submit.production=data.submit.production||{}; data.submit.production.ios=data.submit.production.ios||{}; data.submit.production.ios.ascAppId=process.env.ASC_APP_ID; fs.writeFileSync('eas.json', JSON.stringify(data, null, 2));"
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}

      - name: Submit to App Store(s)
        env:
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APPLE_APP_STORE_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_APPLE_APP_STORE_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: ./google-service-account.json
        run: |
          if [ "${{ github.event.inputs.platform }}" = "all" ]; then
            eas submit -p all --profile production --latest --non-interactive
          elif [ "${{ github.event.inputs.platform }}" = "ios" ]; then
            eas submit -p ios --profile production --latest --non-interactive
          else
            eas submit -p android --profile production --latest --non-interactive
          fi

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f google-service-account.json
          rm -f ~/.private_keys/AuthKey_*.p8
