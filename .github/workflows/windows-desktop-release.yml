name: Windows Desktop Release

# Expo 웹 정적 export 를 Electron 으로 패키징하여 윈도우 포터블 .exe 를 만들고,
# 이미 발행된 릴리스(기본: 최신)에 자산으로 첨부한다.
#
# 자동 실행:
#   native-build-testflight.yml 워크플로가 성공적으로 완료되면(= APK/IPA 릴리스 생성 후)
#   workflow_run 으로 이 워크플로가 트리거되어 방금 만들어진 최신 릴리스에 .exe 를 첨부한다.
#   주의: workflow_run 트리거는 이 파일이 기본 브랜치에 머지된 뒤에만 동작한다.
#
# 수동 실행:
#   workflow_dispatch 로 실행하며 tag 입력으로 특정 릴리스를 지정할 수 있다(비우면 최신).

on:
  workflow_run:
    workflows: ["Native Build, Release and TestFlight (No Expo Cloud)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: '첨부할 릴리스 태그 (비우면 최신 릴리스)'
        required: false
      ref:
        description: '체크아웃할 ref (브랜치/태그/SHA). 비우면 기본 브랜치 사용 — 코드는 항상 최신 fix가 포함된 ref 에서 빌드된다.'
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Desktop (portable .exe)
    runs-on: windows-latest
    # workflow_run 으로 트리거된 경우 선행 워크플로가 성공했을 때만 실행한다.
    # 수동 dispatch 는 항상 실행한다.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Resolve target release tag
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            # 최신(비-draft) 릴리스의 태그를 조회한다.
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Could not resolve a release tag to attach the Windows build to."
            exit 1
          fi
          echo "Resolved release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # 빌드용 코드는 릴리스 태그가 아니라 기본 브랜치(또는 입력 ref)에서 가져온다.
      # 이유: 릴리스 태그 시점 이후 web/Electron 빌드에 필요한 fix(예: Metro
      # resolver 패치)가 머지될 수 있는데, 그 fix를 태그가 가리키는 커밋에
      # 다시 포함시키려면 매번 새 릴리스를 잘라야 하기 때문이다. 데스크톱
      # 패키징은 동일 버전의 웹 export 이므로 최신 master 의 빌드 fix 를
      # 사용해도 무방하다. 결과 .exe 는 여전히 steps.tag.outputs.tag 가
      # 가리키는 릴리스에 첨부된다.
      - name: Resolve checkout ref
        id: ref
        shell: bash
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            REF="$INPUT_REF"
          else
            REF="${{ github.event.repository.default_branch }}"
          fi
          echo "Resolved checkout ref: $REF"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout build code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export web (static)
        run: pnpm exec expo export --platform web

      - name: Build Windows portable executable
        run: pnpm exec electron-builder --win --config electron-builder.yml

      # 데스크탑 앱은 .exe 옆 `quiz-data/` 폴더에서 문제 파일을 로컬 로드한다.
      # 사용자가 .exe 와 동일한 폴더에 풀어 두면 오프라인에서도 풀이가 가능하다.
      # GitHub 저장소의 디렉토리 구조(`config.json` + `<category>/<file>.md`)를
      # 그대로 유지한 채 zip 으로 묶는다.
      - name: Package quiz-data for offline use
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          $zipPath = "release-artifacts/quiz-data.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          # `quiz-data/` 가 zip 최상위에 오도록 부모 폴더를 임시 복사한다.
          $staging = Join-Path $env:RUNNER_TEMP "quiz-data-staging"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item -Path "assets/quiz-data" -Destination (Join-Path $staging "quiz-data") -Recurse
          Compress-Archive -Path (Join-Path $staging "quiz-data") -DestinationPath $zipPath
          Write-Host "Created $zipPath"

      - name: Upload .exe and quiz-data.zip to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            release-artifacts/*.exe \
            release-artifacts/quiz-data.zip \
            --repo "${{ github.repository }}" \
            --clobber
