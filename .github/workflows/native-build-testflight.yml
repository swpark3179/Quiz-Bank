name: Native Build, Release and TestFlight (No Expo Cloud)

# Expo Cloud(EAS Build/Submit)를 전혀 사용하지 않고 GitHub Actions runner 에서
# 직접 native build 를 수행한다.
#   - Android : Gradle 로 release APK 빌드
#   - iOS     : xcodebuild 로 archive/export 하여 IPA 빌드
# Android / iOS 빌드가 모두 성공하면 새 GitHub Release 를 생성하고(APK + IPA 첨부),
# iOS 는 App Store Connect API(altool)로 TestFlight 에 업로드한다.
#
# 참고: `expo prebuild` 는 runner 에서 로컬로 실행되는 CLI 명령으로 native 프로젝트
#       (android/, ios/) 를 생성할 뿐이며 Expo Cloud(EAS) 와는 무관하다.
#       빌드 자체는 gradle / xcodebuild 로 직접 수행된다.
#
# ─────────────────────────────────────────────────────────────────────────────
# 필요한 GitHub Secrets
# ─────────────────────────────────────────────────────────────────────────────
#   [Android 서명]
#     ANDROID_KEYSTORE_BASE64         - release.keystore 를 base64 인코딩한 값
#     ANDROID_KEYSTORE_PASSWORD       - keystore 비밀번호
#     ANDROID_KEY_ALIAS               - key alias
#     ANDROID_KEY_PASSWORD            - key 비밀번호
#
#   [iOS 코드 서명]
#     IOS_P12_BASE64                  - distribution .p12 인증서를 base64 인코딩한 값
#     IOS_P12_PASSWORD                - p12 비밀번호
#     IOS_PROVISIONING_PROFILE_BASE64 - App Store 배포용 .mobileprovision base64
#     IOS_KEYCHAIN_PASSWORD           - 임시 keychain 용 비밀번호 (임의 값)
#     IOS_TEAM_ID                     - Apple Developer Team ID (10자리)
#     IOS_CODE_SIGN_IDENTITY          - 예: "Apple Distribution: Name (TEAMID)"
#     IOS_PROVISIONING_PROFILE_NAME   - provisioning profile 의 Name (UUID 아님)
#
#   [iOS TestFlight 업로드 - App Store Connect API Key]
#     ASC_KEY_ID                      - App Store Connect API Key ID
#     ASC_ISSUER_ID                   - App Store Connect API Issuer ID
#     ASC_PRIVATE_KEY                 - AuthKey_XXXX.p8 파일 내용 (전체 텍스트)

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
      upload_testflight:
        description: 'Upload iOS build to TestFlight'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: bump
        run: |
          pnpm run bump:${{ github.event.inputs.version_bump }}
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          git add package.json app.json
          git commit -m "chore: bump version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD
          git push origin "v$NEW_VERSION"

  build-android:
    name: Build Android APK (local)
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild (android)
        run: pnpm exec expo prebuild --platform android --no-install --clean

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Configure gradle signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${ANDROID_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}
          EOF

          # build.gradle 에 release signingConfig 가 없으면 주입
          BUILD_GRADLE=android/app/build.gradle
          if ! grep -q "MYAPP_RELEASE_STORE_FILE" "$BUILD_GRADLE"; then
            node <<'NODE'
          const fs = require('fs');
          const path = 'android/app/build.gradle';
          let g = fs.readFileSync(path, 'utf8');

          const signingBlock = `
              release {
                  if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                      storeFile file(MYAPP_RELEASE_STORE_FILE)
                      storePassword MYAPP_RELEASE_STORE_PASSWORD
                      keyAlias MYAPP_RELEASE_KEY_ALIAS
                      keyPassword MYAPP_RELEASE_KEY_PASSWORD
                  }
              }
          `;

          // Find the signingConfigs block and locate its matching closing brace
          // via brace counting (regex can't handle nested braces like debug { ... }).
          function findMatchingClose(src, openIdx) {
              let depth = 1;
              for (let i = openIdx + 1; i < src.length; i++) {
                  if (src[i] === '{') depth++;
                  else if (src[i] === '}') {
                      depth--;
                      if (depth === 0) return i;
                  }
              }
              return -1;
          }

          const sigMatch = g.match(/signingConfigs\s*\{/);
          if (sigMatch) {
              const openIdx = sigMatch.index + sigMatch[0].length - 1;
              const closeIdx = findMatchingClose(g, openIdx);
              if (closeIdx !== -1) {
                  // Insert release as a sibling, immediately before the signingConfigs closing brace.
                  g = g.slice(0, closeIdx) + signingBlock + g.slice(closeIdx);
              }
          }

          g = g.replace(/buildTypes\s*\{[\s\S]*?release\s*\{([\s\S]*?)\}/, (m, inner) => {
              if (inner.includes('signingConfig')) return m;
              return m.replace(inner, `${inner}\n            signingConfig signingConfigs.release\n`);
          });
          fs.writeFileSync(path, g);
          NODE
          fi

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: locate-apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          cp "$APK" app-release.apk
          echo "apk_path=app-release.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app-release.apk

  build-ios:
    name: Build iOS IPA (local)
    needs: bump-version
    runs-on: macos-15
    steps:
      - name: Checkout tagged code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Select Xcode
        run: |
          # React Native 0.81 / Expo 54 require Xcode 16+
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=/Applications/Xcode.app
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild (ios)
        run: pnpm exec expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Setup signing keychain
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          for v in IOS_P12_BASE64 IOS_P12_PASSWORD IOS_KEYCHAIN_PASSWORD IOS_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret $v"; exit 1; fi
          done

          KEYCHAIN=build.keychain
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN

          echo "$IOS_P12_BASE64" | base64 -d > cert.p12

          # Diagnostic only: verify p12 integrity/password.
          # OpenSSL 3 rejects legacy algorithms (RC2-40 / 3DES-CBC) by default,
          # so pass -legacy. This is purely informational — the actual import
          # below uses Apple's Security framework which handles legacy p12 fine.
          echo "p12 file size: $(wc -c < cert.p12) bytes"
          echo "p12 password length: ${#IOS_P12_PASSWORD}"
          if openssl pkcs12 -legacy -in cert.p12 -nokeys -passin "pass:$IOS_P12_PASSWORD" -info -noout 2>&1; then
            echo "p12 verification OK"
          else
            echo "::warning::openssl could not parse the p12 even with -legacy; relying on 'security import' which may still succeed."
          fi

          # Import directly with Apple's Security framework — no openssl re-encryption.
          security import cert.p12 -k "$KEYCHAIN" \
            -P "$IOS_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "$PROFILE_DIR/profile.mobileprovision"

      - name: Build & archive
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        working-directory: ios
        run: |
          WORKSPACE=$(ls *.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)

          # TestFlight 는 동일 marketing version 에 대해 고유한 build number 를 요구하므로
          # GitHub run number 를 CFBundleVersion(CURRENT_PROJECT_VERSION)으로 주입한다.
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export IPA (app-store)
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        working-directory: ios
        run: |
          # TestFlight 업로드를 위해 app-store export method 사용
          BUNDLE_ID=$(node -p "require('../app.json').expo.ios.bundleIdentifier")

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key><string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$PWD/build/App.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build/ipa"

          IPA=$(find "$PWD/build/ipa" -name "*.ipa" | head -n1)
          cp "$IPA" "$GITHUB_WORKSPACE/app-release.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: app-release.ipa

  submit-testflight:
    name: Upload iOS to TestFlight (altool)
    needs: build-ios
    if: ${{ github.event.inputs.upload_testflight == 'true' }}
    runs-on: macos-15
    steps:
      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-ipa

      - name: Verify TestFlight secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.ASC_KEY_ID }}" ]     && MISSING="$MISSING ASC_KEY_ID"
          [ -z "${{ secrets.ASC_ISSUER_ID }}" ]  && MISSING="$MISSING ASC_ISSUER_ID"
          [ -z "${{ secrets.ASC_PRIVATE_KEY }}" ] && MISSING="$MISSING ASC_PRIVATE_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets for TestFlight upload:$MISSING"
            exit 1
          fi

      - name: Setup App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # altool 은 ~/private_keys 등 정해진 경로에서 AuthKey_<KEY_ID>.p8 를 찾는다.
          mkdir -p ~/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # 업로드 전 IPA 검증 후 App Store Connect(TestFlight)로 업로드
          xcrun altool --validate-app \
            -f app-release.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

          xcrun altool --upload-app \
            -f app-release.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

  create-release:
    name: Create GitHub Release
    needs: [bump-version, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-ipa

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.bump-version.outputs.new_version }}" \
            --title "Release v${{ needs.bump-version.outputs.new_version }}" \
            --generate-notes \
            app-release.apk \
            app-release.ipa
