name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: bump
        run: |
          # Make sure the bump scripts are run to update both package.json and app.json
          pnpm run bump:${{ github.event.inputs.version_bump }}

          # Extract new version from package.json
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Commit and Tag
          git add package.json app.json
          git commit -m "chore: bump version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD
          git push origin "v$NEW_VERSION"

  build-and-release-ios:
    name: Build and Release iOS
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          packager: pnpm
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install

      - name: Build iOS IPA
        run: |
          eas build --platform ios --profile production --non-interactive --wait

          # Fetch the build info
          BUILD_INFO=$(eas build:list --platform ios --status finished --json --limit 1)

          # Extract URL and ID
          IPA_URL=$(echo "$BUILD_INFO" | jq -r '.[0].artifacts.buildUrl')
          IOS_BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id')

          # Download IPA
          curl -L -o app-release.ipa $IPA_URL

          # Save ID to environment for the next step
          echo "IOS_BUILD_ID=$IOS_BUILD_ID" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate initial notes
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="v${{ needs.bump-version.outputs.new_version }}" \
            > notes.json

          # Extract body and append the build ID
          NOTES_BODY=$(cat notes.json | jq -r .body)
          printf "%s\n\n**EAS iOS Build ID:** %s\n" "$NOTES_BODY" "$IOS_BUILD_ID" > release_notes.txt

          # Create release
          gh release create "v${{ needs.bump-version.outputs.new_version }}" \
            --title "Release v${{ needs.bump-version.outputs.new_version }}" \
            --notes-file release_notes.txt \
            app-release.ipa
