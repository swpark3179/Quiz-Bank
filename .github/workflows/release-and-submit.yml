name: Release and Submit

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: bump
        run: |
          # Make sure the bump scripts are run to update both package.json and app.json
          npm run bump:${{ github.event.inputs.version_bump }}

          # Extract new version from package.json
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Commit and Tag
          git add package.json app.json
          git commit -m "chore: bump version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD
          git push origin "v$NEW_VERSION"

  build-and-release:
    name: Build, Release and Submit
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          packager: npm
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: |
          eas build --platform android --profile production-apk --non-interactive --wait
          APK_URL=$(eas build:list --platform android --status finished --json --limit 1 | jq -r '.[0].artifacts.buildUrl')
          curl -L -o app-release.apk $APK_URL

      - name: Build iOS IPA
        run: |
          eas build --platform ios --profile production --non-interactive --wait
          IPA_URL=$(eas build:list --platform ios --status finished --json --limit 1 | jq -r '.[0].artifacts.buildUrl')
          curl -L -o app-release.ipa $IPA_URL

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.bump-version.outputs.new_version }}" \
            --title "Release v${{ needs.bump-version.outputs.new_version }}" \
            --generate-notes \
            app-release.apk \
            app-release.ipa

      - name: Setup ASC Private Key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ -n "$ASC_PRIVATE_KEY" ]; then
            echo "$ASC_PRIVATE_KEY" > ./asc-key.p8
            echo "EXPO_APPLE_APP_STORE_KEY_PATH=$(pwd)/asc-key.p8" >> $GITHUB_ENV
          fi

      - name: Inject ascAppId into eas.json
        if: ${{ secrets.ASC_APP_ID != '' }}
        run: |
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('eas.json')); data.submit=data.submit||{}; data.submit.production=data.submit.production||{}; data.submit.production.ios=data.submit.production.ios||{}; data.submit.production.ios.ascAppId=process.env.ASC_APP_ID; fs.writeFileSync('eas.json', JSON.stringify(data, null, 2));"
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}

      - name: Submit to App Store Connect (TestFlight)
        env:
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APPLE_APP_STORE_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_APPLE_APP_STORE_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if [ -f "./asc-key.p8" ]; then
            export EXPO_APPLE_APP_STORE_KEY_PATH=$(pwd)/asc-key.p8
            eas submit -p ios --profile production --path app-release.ipa --non-interactive
          else
            echo "Skipping iOS Submit due to missing ASC_PRIVATE_KEY"
          fi
