name: Release and Submit

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: bump
        run: |
          # Make sure the bump scripts are run to update both package.json and app.json
          npm run bump:${{ github.event.inputs.version_bump }}

          # Extract new version from package.json
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Commit and Tag
          git add package.json app.json
          git commit -m "chore: bump version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD
          git push origin "v$NEW_VERSION"

  build-and-release:
    name: Build, Release and Submit
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Prepare Google Service Account Key
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" ]; then
            # Decode if base64 or write directly if JSON
            if echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" | grep -q "^{"; then
              echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" > ./google-service-account.json
            else
              echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > ./google-service-account.json
            fi
          fi

      - name: Build Android APK
        run: |
          eas build --platform android --profile production-apk --non-interactive --wait --local=false
          APK_URL=$(eas build:list --platform android --status finished --json --limit 1 | jq -r '.[0].artifacts.buildUrl')
          curl -L -o app-release.apk $APK_URL

      - name: Build Android AAB (Store)
        run: |
          eas build --platform android --profile production --non-interactive --wait --local=false
          AAB_URL=$(eas build:list --platform android --status finished --json --limit 1 | jq -r '.[0].artifacts.buildUrl')
          curl -L -o app-release.aab $AAB_URL

      - name: Build iOS IPA
        run: |
          eas build --platform ios --profile production --non-interactive --wait --local=false
          IPA_URL=$(eas build:list --platform ios --status finished --json --limit 1 | jq -r '.[0].artifacts.buildUrl')
          curl -L -o app-release.ipa $IPA_URL

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.bump-version.outputs.new_version }}" \
            --title "Release v${{ needs.bump-version.outputs.new_version }}" \
            --generate-notes \
            app-release.apk \
            app-release.ipa \
            app-release.aab

      - name: Submit to Google Play
        run: |
          if [ -f "./google-service-account.json" ]; then
            export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/google-service-account.json
            eas submit -p android --profile production --path app-release.aab --non-interactive
          else
            echo "Skipping Android Submit due to missing GOOGLE_SERVICE_ACCOUNT_KEY"
          fi

      - name: Setup ASC Private Key
        run: |
          if [ -n "${{ secrets.ASC_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.ASC_PRIVATE_KEY }}" > ./asc-key.p8
            export EXPO_APPLE_APP_STORE_KEY_PATH=$(pwd)/asc-key.p8
          fi

      - name: Submit to App Store Connect (TestFlight)
        env:
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_APPLE_APP_STORE_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_APPLE_APP_STORE_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if [ -f "./asc-key.p8" ]; then
            export EXPO_APPLE_APP_STORE_KEY_PATH=$(pwd)/asc-key.p8
            eas submit -p ios --profile production --path app-release.ipa --non-interactive
          else
            echo "Skipping iOS Submit due to missing ASC_PRIVATE_KEY"
          fi
