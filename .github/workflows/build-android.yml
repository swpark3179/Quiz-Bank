name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          packager: pnpm
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: |
          npm install -g pnpm@10
          pnpm install

      - name: Build Android APK
        run: |
          eas build --platform android --profile production-apk --non-interactive --wait
          APK_URL=$(eas build:list --platform android --status finished --json --limit 1 | jq -r '.[0].artifacts.buildUrl')

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "::error::Could not extract APK_URL from eas build list."
            exit 1
          fi

          curl -L -o app-release.apk "$APK_URL"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app-release.apk

      - name: Upload APK to Latest Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest release tag
          LATEST_TAG=$(gh release view --json tagName -q .tagName)

          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No release found. Cannot upload APK."
            exit 1
          fi

          echo "Uploading APK to release: $LATEST_TAG"
          # Upload the APK to the latest release, clobbering if it already exists
          gh release upload "$LATEST_TAG" app-release.apk --clobber
